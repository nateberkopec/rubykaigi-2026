[tasks.slide-count]
description = "Count slides in DECKSET.md"
quiet = true
run = '''
test -f DECKSET.md || { echo "DECKSET.md not found" >&2; exit 1; }
awk 'BEGIN { count = 1 } /^[[:space:]]*---[[:space:]]*$/ { count++ } END { print count }' DECKSET.md
'''

[tasks.present]
description = "Open DECKSET.md in Deckset, start presenting, and auto-advance slides to fit a total time; pass minutes with: mise run present -- 25"
run = "fish scripts/pecha-kucha.fish --total-time-mode --present"

[tasks.rehearse]
description = "Open DECKSET.md in Deckset, start rehearsal mode, and auto-advance slides to fit a total time; pass minutes with: mise run rehearse -- 25"
run = "fish scripts/pecha-kucha.fish --total-time-mode --rehearse"
