[tools]
ruby = "4"
node = "22"
hk = "latest"
watchexec = "latest"

[tasks.generate-slides]
description = "Generate presentation.md from OUTLINE.md"
sources = ["OUTLINE.md", "lib/generate_slides.rb"]
outputs = ["presentation.md"]
run = "ruby lib/generate_slides.rb"

[tasks.build]
description = "Generate slides and build dist/presentation.html and dist/reading-mode.html"
depends = ["generate-slides"]
sources = ["OUTLINE.md", "presentation.md", "lib/generate_slides.rb", "lib/build.rb", "src/page.html.erb", "src/reading_mode.html.erb", "src/slides.js.erb"]
outputs = ["dist/presentation.html", "dist/reading-mode.html"]
run = "ruby lib/build.rb"

[tasks.clean]
description = "Remove dist artifacts"
run = "rm -rf dist"

[tasks.serve]
description = "Build, open the presentation, and watch for changes to rebuild automatically"
depends = ["build"]
run = "open dist/presentation.html && mise watch --skip-deps --postpone --on-busy-update=queue build"

[tasks.test]
description = "Run tests"
run = "ruby build_test.rb"

[tasks.lint]
description = "Check Ruby syntax"
run = "ruby -wc lib/build.rb build_test.rb lib/generate_slides.rb"

[tasks.count]
description = "Show slide count from presentation.md"
run = "ruby -e 'c = File.read(\"presentation.md\").split(/^\\s*---\\s*$/).count { |s| !s.strip.empty? }; puts \"#{c} slides\"'"
