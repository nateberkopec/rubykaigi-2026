[tools]
ruby = "4"
node = "22"
hk = "latest"
watchexec = "latest"

[tasks.build]
description = "Build dist/presentation.html and dist/reading-mode.html from presentation.md"
sources = ["presentation.md", "lib/build.rb", "src/page.html.erb", "src/reading_mode.html.erb", "src/slides.js.erb"]
outputs = ["dist/presentation.html", "dist/reading-mode.html"]
run = "ruby lib/build.rb"

[tasks.clean]
description = "Remove dist artifacts"
run = "rm -rf dist"

[tasks.serve]
description = "Build, open the presentation, and watch for changes to rebuild automatically"
depends = ["build"]
run = "open dist/presentation.html && mise watch --skip-deps --postpone --on-busy-update=queue build"

[tasks.test]
description = "Run tests"
run = "ruby test/build_test.rb"

[tasks.lint]
description = "Check Ruby syntax"
run = "ruby -wc lib/build.rb test/build_test.rb"

[tasks.count]
description = "Show slide count from presentation.md"
run = "ruby -e 'c = File.read(\"presentation.md\").split(/^\\s*---\\s*$/).count { |s| !s.strip.empty? }; puts \"#{c} slides\"'"
